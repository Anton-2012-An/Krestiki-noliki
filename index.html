<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крестики-нолики · Исправлено начисление побед</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif; transition: background 0.2s; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; background: #1a1a2e; }
        body.light { background: #e2e6ed; }
        body.light .game-wrapper { background: #f8f9fc; box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
        body.light .game-panel { background: #ffffff; }
        body.light .top-bar, body.light .difficulty-box, body.light .size-box, body.light .status, body.light .side-box, body.light .quests-panel { background: #eef2f7; }
        body.light .cell { background: #ffffff; box-shadow: 0 4px 8px rgba(0,0,0,0.05), inset 0 0 0 1px #cbd5e1; color: #1e2f3a; }
        body.light .cheat-cell { background: #ffe0e0; box-shadow: 0 0 0 2px #ff4444; }
        body.dark { background: #0f1217; }
        body.dark .game-wrapper { background: #1a1d24; box-shadow: 0 12px 28px rgba(0,0,0,0.5); }
        body.dark .game-panel { background: #22262f; }
        body.dark .top-bar, body.dark .difficulty-box, body.dark .size-box, body.dark .status, body.dark .side-box, body.dark .quests-panel { background: #2a2e3a; color: #e0e0e0; }
        body.dark .cell { background: #2a2e3a; box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 0 0 1px #3a3f4e; color: #e0e0e0; }
        body.dark .cheat-cell { background: #6b2a2a; box-shadow: 0 0 0 2px #ff6666; }
        body.dark .lang-btn, body.dark .difficulty-btn, body.dark .size-btn, body.dark .side-btn { background: #3a3f4e; color: #e0e0e0; }
        body.dark .lang-btn.active, body.dark .difficulty-btn.active, body.dark .size-btn.active, body.dark .side-btn.active { background: #5a7a9a; color: white; }
        body.dark .modal-content, body.dark .shop-item { background: #2a2e3a; color: #e0e0e0; }
        .game-wrapper { max-width: 1200px; width: 100%; border-radius: 2rem; padding: 16px; transition: background 0.2s; }
        .game-panel { border-radius: 1.8rem; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding: 8px 18px; border-radius: 60px; margin-bottom: 20px; }
        .lang-selector { display: flex; gap: 6px; }
        .lang-btn { border: none; font-weight: bold; font-size: 0.75rem; padding: 5px 12px; border-radius: 30px; cursor: pointer; }
        .score-board { padding: 5px 16px; border-radius: 40px; font-weight: bold; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); }
        .score-board span:first-child { font-size: 0.8rem; padding: 4px 12px; border-radius: 30px; background: #2c5a6e; color: white; }
        .settings-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; justify-content: space-between; }
        .difficulty-box, .size-box, .side-box { border-radius: 48px; padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .difficulty-btn, .size-btn, .side-btn { border: none; padding: 5px 14px; border-radius: 32px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .difficulty-btn.active, .size-btn.active, .side-btn.active { background: #2c5a6e; color: white; }
        .status { margin: 12px 0 18px; padding: 12px; text-align: center; font-size: 1.2rem; font-weight: bold; border-radius: 60px; }
        .main-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .game-area { flex: 2; min-width: 300px; }
        .quests-area { flex: 1; min-width: 250px; }
        .board-container { position: relative; display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
        .board { display: grid; justify-content: center; gap: 10px; padding: 20px; border-radius: 48px; background: rgba(0,0,0,0.03); position: relative; }
        .cell { border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: bold; cursor: pointer; transition: 0.05s linear; aspect-ratio: 1 / 1; min-width: 70px; position: relative; z-index: 1; }
        .cell:active { transform: scale(0.97); }
        .win-line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .win-line-svg line { stroke: #ff0000; stroke-width: 5; }
        .cheat-area { display: flex; flex-direction: column; align-items: center; justify-content: center; animation: slideIn 0.3s ease-out; position: relative; }
        .cheat-cell { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: bold; animation: pulse 0.3s ease-in-out; }
        .cheat-label { margin-top: 8px; font-size: 0.7rem; font-weight: bold; text-align: center; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .action-buttons { display: flex; gap: 10px; margin-top: 8px; }
        .continue-btn, .reset-btn, .promo-btn, .reset-quests-btn { border: none; flex: 1; font-size: 1rem; font-weight: bold; padding: 10px; border-radius: 60px; cursor: pointer; }
        .continue-btn { background: #4caf50; color: white; }
        .continue-btn:disabled { background: #9e9e9e; cursor: not-allowed; }
        .reset-btn { background: #dce2ec; }
        .promo-btn { background: #ff9800; color: white; margin-top: 8px; }
        .reset-quests-btn { background: #f44336; color: white; margin-top: 8px; }
        .reset-quests-btn:disabled { background: #9e9e9e; cursor: not-allowed; }
        .promo-input { width: 100%; padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin-top: 8px; text-align: center; }
        .quests-panel { border-radius: 48px; padding: 16px; margin-bottom: 20px; }
        .quests-panel h3 { margin: 0 0 12px 0; font-size: 1.2rem; text-align: center; }
        .quest-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.1); font-size: 0.8rem; }
        .quest-item.completed { opacity: 0.6; text-decoration: line-through; }
        .quest-reward { background: #ff9800; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { border-radius: 2rem; max-width: 450px; width: 90%; padding: 24px; text-align: center; }
        .shop-item { margin: 12px 0; padding: 12px; border-radius: 40px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .buy-btn { border: none; padding: 6px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .close-modal { margin-top: 12px; padding: 8px 20px; border-radius: 30px; cursor: pointer; border: none; font-weight: bold; background: #bcc4d0; }
        .settings-btn, .shop-btn { border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; font-weight: bold; background: #2c5a6e; color: white; }
        .setting-option { margin: 15px 0; text-align: left; }
        .setting-option select { padding: 8px; border-radius: 30px; width: 100%; cursor: pointer; }
        @media (max-width: 800px) { .main-row { flex-direction: column; } .cell { font-size: 1.8rem; min-width: 55px; } .cheat-cell { width: 55px; height: 55px; font-size: 1.8rem; } }
    </style>
</head>
<body class="light">
<div class="game-wrapper">
    <div class="game-panel">
        <div class="top-bar">
            <div class="lang-selector">
                <button class="lang-btn" data-lang="ru">🇷🇺 Рус</button>
                <button class="lang-btn" data-lang="be">🇧🇾 Бел</button>
                <button class="lang-btn" data-lang="en">🇬🇧 Eng</button>
            </div>
            <div class="score-board"><span id="scoreLabel"></span><span id="winScore">0</span></div>
            <button class="shop-btn" id="openShopBtn"></button>
            <button class="settings-btn" id="openSettingsBtn"></button>
        </div>
        <div class="settings-row">
            <div class="difficulty-box"><span id="diffLabel"></span>
                <button class="difficulty-btn" data-diff="easy"></button>
                <button class="difficulty-btn" data-diff="medium"></button>
                <button class="difficulty-btn" data-diff="hard"></button>
                <button class="difficulty-btn" data-diff="impossible" id="impossibleBtn"></button>
            </div>
            <div class="size-box"><span id="sizeLabel"></span>
                <button class="size-btn" data-size="3">3x3</button>
                <button class="size-btn" data-size="4" id="size4Btn" disabled>4x4 🔒</button>
                <button class="size-btn" data-size="5" id="size5Btn" disabled>5x5 🔒</button>
            </div>
            <div class="side-box"><span id="sideLabel"></span>
                <button class="side-btn" data-side="X">❌ X</button>
                <button class="side-btn" data-side="O">⭕ O</button>
            </div>
        </div>
        <div class="main-row">
            <div class="game-area">
                <div class="status" id="statusMsg"></div>
                <div class="board-container">
                    <div class="board" id="board" style="position: relative;"><svg class="win-line-svg" id="winLineSvg"></svg></div>
                    <div id="cheatArea" style="display: none;" class="cheat-area">
                        <div class="cheat-cell" id="cheatCell"></div>
                        <div class="cheat-label" id="cheatLabel"></div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="continue-btn" id="continueBtn" disabled></button>
                    <button class="reset-btn" id="resetGameBtn"></button>
                </div>
                <input type="text" id="promoInput" class="promo-input" placeholder="">
                <button class="promo-btn" id="applyPromoBtn"></button>
                <button class="reset-quests-btn" id="resetQuestsBtn" disabled></button>
            </div>
            <div class="quests-area">
                <div class="quests-panel">
                    <h3 id="questsTitle"></h3>
                    <div id="questsList"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="shopModal" class="modal"><div class="modal-content"><h2 id="shopTitle"></h2>
    <div class="shop-item"><span id="doubleText"></span><button class="buy-btn" data-item="double" id="buyDouble"></button></div>
    <div class="shop-item"><span id="size4Text"></span><button class="buy-btn" data-item="size4" id="buySize4"></button></div>
    <div class="shop-item"><span id="size5Text"></span><button class="buy-btn" data-item="size5" id="buySize5"></button></div>
    <div class="shop-item"><span id="impossibleText"></span><button class="buy-btn" data-item="impossible" id="buyImpossible"></button></div>
    <div class="shop-item"><span id="randomText"></span><button class="buy-btn" data-item="random" id="buyRandom"></button></div>
    <button class="close-modal" id="closeModal"></button>
</div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><h2 id="settingsTitle"></h2>
    <div class="setting-option"><label id="langSettingLabel"></label><select id="langSelect"><option value="ru">Русский</option><option value="be">Беларуская</option><option value="en">English</option></select></div>
    <div class="setting-option"><label id="themeSettingLabel"></label><select id="themeSelect"><option value="light"></option><option value="dark"></option></select></div>
    <button class="close-modal" id="closeSettingsBtn"></button>
</div></div>

<script>
    const translations = {
        ru: {
            score:"ПОБЕДЫ", shop:"МАГАЗИН", diff:"Сложность:", size:"Поле:", side:"Играть за:",

            continue:"ПРОДОЛЖИТЬ", newGame:"НОВАЯ ИГРА", settings:"НАСТРОЙКИ",

            settingsTitle:"НАСТРОЙКИ", langLabel:"Язык:", themeLabel:"Тема:", light:"Светлая", dark:"Тёмная",

            promoPlaceholder:"Введите промокод", promoBtn:"АКТИВИРОВАТЬ ПРОМОКОД", resetQuests:"СБРОСИТЬ КВЕСТЫ",
            questsTitle:"🎯 КВЕСТЫ", promoInvalid:"Неверный промокод", 
            promoEmpty:"🎁 СКРЫТЫЙ ПРОМОКОД! +2 победы", promoUsed:"Промокод уже использован",
            doubleAlert:"✨ Удвоение активировано!", size4Alert:"🎲 Поле 4x4 открыто!", coinAlert:"💰 +1 победа!",
            questComplete:"🎉 Квест выполнен: +", secretBonus:"🎁 СЕКРЕТНЫЙ БОНУС! Нажато ПРОДОЛЖИТЬ 10 раз! +5 побед",
            resetQuestsConfirm:"Все квесты выполнены! Сбросить их и начать заново?",

            quest7:"3 победы подряд", quest8:"Выиграть на поле 5x5 в режиме СЛОЖНЫЙ",
            quest9:"Выиграть на поле 4x4 три раза", quest10:"Активировать скрытый промокод",
            reward:"побед"
        },
        be: {
            score:"ПЕРАМОГІ", shop:"КРАМА", diff:"Складанасць:", size:"Поле:", side:"Гуляць за:",
            easy:"Лёгкі", medium:"Сярэдні", hard:"Складны", impossible:"Немагчымы",
            win:"ВЫ ПЕРАМАГЛІ! +", lose:"ВЫ ПРАЙГРАЛІ", draw:"НІЧЫЯ", yourTurn:"Ваш ход", aiTurn:"Ход AI",
            continue:"ПРАЦЯГНУЦЬ", newGame:"НОВАЯ ГУЛЬНЯ", settings:"НАСТРОЙКІ",
            doubleItem:"✨ Падваенне балаў (2 хв)", size4Item:"🎲 ПОЛЕ 4x4", size5Item:"🌟 ПОЛЕ 5x5",
            impossibleItem:"💀 НЕМАГЧЫМЫ ўзровень", randomItem:"🎲 РАНДАМ (сюрпрыз)",
            purchased:"НАБУТА", buy:"перамогі", close:"ЗАКРЫЦЬ",
            settingsTitle:"НАСТРОЙКІ", langLabel:"Мова:", themeLabel:"Тэма:", light:"Светлая", dark:"Цёмная",
            cheatLabel:"БОТ ПРАДОЎЖЫЎ РАД ЗА ПОЛЕМ!", playAsX:"Крыжык (X)", playAsO:"Нолік (O)",
            promoPlaceholder:"Увядзіце промакод", promoBtn:"АКТЫВАВАЦЬ ПРОМАКОД", resetQuests:"СКІНУЦЬ КВЕСТЫ",
            questsTitle:"🎯 КВЕСТЫ", promoInvalid:"Няправільны промакод",
            promoEmpty:"🎁 СКРЫТЫ ПРОМАКОД! +2 перамогі", promoUsed:"Промакод ужо выкарыстаны",
            doubleAlert:"✨ Падваенне актывавана!", size4Alert:"🎲 Поле 4x4 адкрыта!", coinAlert:"💰 +1 перамога!",
            questComplete:"🎉 Квест выкананы: +", secretBonus:"🎁 СЕКРЭТНЫ БОНУС! Націснута ПРАЦЯГНУЦЬ 10 разоў! +5 перамог",
            resetQuestsConfirm:"Усе квесты выкананы! Скінуць іх і пачаць нанава?",
            quest1:"Згуляць 10 гульняў", quest2:"Купіць усе паляпшэнні", quest3:"Выйграць на ўзроўні Немагчымы",
            quest4:"Згуляць 5 разоў за крыжык ❌", quest5:"Згуляць 5 разоў за нолік ⭕", quest6:"Выйграць 5 партый",
            quest7:"3 перамогі запар", quest8:"Выйграць на полі 5x5 у рэжыме СКЛАДАНЫ",
            quest9:"Выйграць на полі 4x4 тры разы", quest10:"Актываваць схаваны промакод",
            reward:"перамог"
        },
        en: {
            score:"WINS", shop:"SHOP", diff:"Difficulty:", size:"Board:", side:"Play as:",
            easy:"Easy", medium:"Medium", hard:"Hard", impossible:"Impossible",
            win:"YOU WIN! +", lose:"YOU LOSE", draw:"DRAW", yourTurn:"Your turn", aiTurn:"AI turn",
            continue:"CONTINUE", newGame:"NEW GAME", settings:"SETTINGS",
            doubleItem:"✨ Double points (2 min)", size4Item:"🎲 4x4 BOARD", size5Item:"🌟 5x5 BOARD",
            impossibleItem:"💀 IMPOSSIBLE level", randomItem:"🎲 RANDOM (surprise)",
            purchased:"PURCHASED", buy:"wins", close:"CLOSE",
            settingsTitle:"SETTINGS", langLabel:"Language:", themeLabel:"Theme:", light:"Light", dark:"Dark",
            cheatLabel:"BOT EXTENDED ROW BEYOND BOARD!", playAsX:"X", playAsO:"O",
            promoPlaceholder:"Enter promo code", promoBtn:"ACTIVATE PROMO CODE", resetQuests:"RESET QUESTS",
            questsTitle:"🎯 QUESTS", promoInvalid:"Invalid promo code",
            promoEmpty:"🎁 HIDDEN PROMO CODE! +2 wins", promoUsed:"Promo code already used",
            doubleAlert:"✨ Double points activated!", size4Alert:"🎲 4x4 board unlocked!", coinAlert:"💰 +1 win!",
            questComplete:"🎉 Quest completed: +", secretBonus:"🎁 SECRET BONUS! CONTINUE pressed 10 times! +5 wins",
            resetQuestsConfirm:"All quests completed! Reset and start over?",
            quest1:"Play 10 games", quest2:"Buy all upgrades", quest3:"Win on Impossible level",
            quest4:"Play 5 times as X ❌", quest5:"Play 5 times as O ⭕", quest6:"Win 5 games",
            quest7:"3 wins in a row", quest8:"Win on 5x5 board in HARD mode",
            quest9:"Win on 4x4 board three times", quest10:"Activate hidden promo code",
            reward:"wins"
        }
    };
    
    let currentLang = 'ru', winCounter = 0, doublePointsActive = false, doublePointsTimeout = null, doublePurchased = false;
    let boardSize = 3, difficulty = 'easy', impossibleUnlocked = false, size4Unlocked = false, size5Unlocked = false;
    let boardState = [], gameActive = true, currentPlayer = 'X', playerSide = 'X', aiSide = 'O';
    let gameEnded = false, winnerDeclared = false, currentTheme = 'light';
    let totalGames = 0, gamesAsX = 0, gamesAsO = 0, winsCount = 0, consecutiveWins = 0, impossibleWinDone = false, allUpgradesBought = false, size5HardWin = false, size4WinsCount = 0;
    let isProcessingWin = false;
    let continuePressCount = 0, secretBonusUsed = false;
    let hiddenPromoUsed = false;
    let lastWinAwarded = false; // защита от двойного начисления
    
    function updateAllTexts() {
        document.getElementById('scoreLabel').innerHTML = translations[currentLang].score;
        document.getElementById('diffLabel').innerHTML = translations[currentLang].diff;
        document.getElementById('sizeLabel').innerHTML = translations[currentLang].size;
        document.getElementById('sideLabel').innerHTML = translations[currentLang].side;
        document.getElementById('continueBtn').innerHTML = translations[currentLang].continue;
        document.getElementById('resetGameBtn').innerHTML = translations[currentLang].newGame;
        document.getElementById('openShopBtn').innerHTML = translations[currentLang].shop;
        document.getElementById('openSettingsBtn').innerHTML = translations[currentLang].settings;
        document.getElementById('shopTitle').innerHTML = translations[currentLang].shop;
        document.getElementById('settingsTitle').innerHTML = translations[currentLang].settingsTitle;
        document.getElementById('langSettingLabel').innerHTML = translations[currentLang].langLabel;
        document.getElementById('themeSettingLabel').innerHTML = translations[currentLang].themeLabel;
        document.getElementById('doubleText').innerHTML = translations[currentLang].doubleItem;
        document.getElementById('size4Text').innerHTML = translations[currentLang].size4Item;
        document.getElementById('size5Text').innerHTML = translations[currentLang].size5Item;
        document.getElementById('impossibleText').innerHTML = translations[currentLang].impossibleItem;
        document.getElementById('randomText').innerHTML = translations[currentLang].randomItem;
        document.getElementById('cheatLabel').innerHTML = translations[currentLang].cheatLabel;
        document.getElementById('promoInput').placeholder = translations[currentLang].promoPlaceholder;
        document.getElementById('applyPromoBtn').innerHTML = translations[currentLang].promoBtn;
        document.getElementById('resetQuestsBtn').innerHTML = translations[currentLang].resetQuests;
        document.getElementById('questsTitle').innerHTML = translations[currentLang].questsTitle;
        document.getElementById('closeModal').innerHTML = translations[currentLang].close;
        document.getElementById('closeSettingsBtn').innerHTML = translations[currentLang].close;
        document.getElementById('themeSelect').options[0].text = translations[currentLang].light;
        document.getElementById('themeSelect').options[1].text = translations[currentLang].dark;
        document.querySelectorAll('.difficulty-btn').forEach(btn => { let d=btn.dataset.diff; if(d==='easy')btn.innerHTML=translations[currentLang].easy; if(d==='medium')btn.innerHTML=translations[currentLang].medium; if(d==='hard')btn.innerHTML=translations[currentLang].hard; if(d==='impossible')btn.innerHTML=translations[currentLang].impossible+(impossibleUnlocked?'':' 🔒'); });
        updateShopButtons(); if(!gameEnded) updateStatusMsg();
        renderQuests();
        checkAllQuestsCompleted();
    }
    
    function updateShopButtons() {
        let bd=document.getElementById('buyDouble'), b4=document.getElementById('buySize4'), b5=document.getElementById('buySize5'), bi=document.getElementById('buyImpossible'), br=document.getElementById('buyRandom');
        if(doublePurchased){bd.innerHTML=translations[currentLang].purchased;bd.disabled=true;}else{bd.innerHTML=`1 ${translations[currentLang].buy}`;bd.disabled=winCounter<1;}
        if(size4Unlocked){b4.innerHTML=translations[currentLang].purchased;b4.disabled=true;}else{b4.innerHTML=`2 ${translations[currentLang].buy}`;b4.disabled=winCounter<2;}
        if(size5Unlocked){b5.innerHTML=translations[currentLang].purchased;b5.disabled=true;}else{b5.innerHTML=`4 ${translations[currentLang].buy}`;b5.disabled=winCounter<4;}
        if(impossibleUnlocked){bi.innerHTML=translations[currentLang].purchased;bi.disabled=true;}else{bi.innerHTML=`3 ${translations[currentLang].buy}`;bi.disabled=winCounter<3;}
        br.innerHTML=`2 ${translations[currentLang].buy}`;br.disabled=winCounter<2;
    }
    
    function addWins(amount, fromQuest = false) {
        if(!fromQuest && lastWinAwarded) return;
        winCounter += amount;
        document.getElementById('winScore').innerHTML = winCounter;
        winsCount += amount;
        updateShopButtons();
        renderQuests();
        if(!fromQuest) lastWinAwarded = true;
    }
    
    function updateStatusMsg() { if(gameEnded) return; document.getElementById('statusMsg').innerHTML = (currentPlayer===playerSide)?translations[currentLang].yourTurn:translations[currentLang].aiTurn; }
    function hideCheat() { document.getElementById('cheatArea').style.display='none'; }
    function clearWinLine() { document.getElementById('winLineSvg').innerHTML=''; }
    function drawWinLine(x1,y1,x2,y2) { const svg=document.getElementById('winLineSvg'); svg.innerHTML=''; const line=document.createElementNS('http://www.w3.org/2000/svg','line'); line.setAttribute('x1',x1); line.setAttribute('y1',y1); line.setAttribute('x2',x2); line.setAttribute('y2',y2); line.setAttribute('stroke','#ff0000'); line.setAttribute('stroke-width','5'); svg.appendChild(line); }
    function drawWinLineOnBoard(lineCells) { if(lineCells.length===0) return; const boardRect = document.getElementById('board').getBoundingClientRect(); const allCells = document.querySelectorAll('.cell'); const firstCell = allCells[lineCells[0]].getBoundingClientRect(); const lastCell = allCells[lineCells[lineCells.length-1]].getBoundingClientRect(); const x1 = firstCell.left + firstCell.width/2 - boardRect.left; const y1 = firstCell.top + firstCell.height/2 - boardRect.top; const x2 = lastCell.left + lastCell.width/2 - boardRect.left; const y2 = lastCell.top + lastCell.height/2 - boardRect.top; drawWinLine(x1,y1,x2,y2); }
    
    function handleWin(winner) {
        if(isProcessingWin) return;
        isProcessingWin = true;
        gameActive = false;
        gameEnded = true;
        lastWinAwarded = false;
        
        if(winner === 'player') {
            let points = doublePointsActive ? 2 : 1;
            addWins(points, false);
            consecutiveWins++;
            if(consecutiveWins>=3) checkQuestConsecutiveWins();
            document.getElementById('statusMsg').innerHTML = `${translations[currentLang].win}${points}`;
            checkQuestsAfterGame(true);
        } else if(winner === 'ai') {
            consecutiveWins = 0;
            document.getElementById('statusMsg').innerHTML = translations[currentLang].lose;
            checkQuestsAfterGame(false);
        } else if(winner === 'draw') {
            consecutiveWins = 0;
            document.getElementById('statusMsg').innerHTML = translations[currentLang].draw;
        }
        updateShopButtons();
        updateSizeButtons();
        document.getElementById('continueBtn').disabled = false;
        isProcessingWin = false;
        checkAllQuestsCompleted();
    }
    
    function checkAndHandleWin() {
        if(gameEnded || isProcessingWin) return;
        let playerWin = checkWinnerGeneric(boardState, boardSize, playerSide);
        let aiWin = checkWinnerGeneric(boardState, boardSize, aiSide);
        if(playerWin) { let line = findWinningLineIndices(boardState, boardSize, playerSide); drawWinLineOnBoard(line); handleWin('player'); return true; }
        if(aiWin) { let line = findWinningLineIndices(boardState, boardSize, aiSide); drawWinLineOnBoard(line); handleWin('ai'); return true; }
        if(!playerWin && !aiWin && boardState.every(c => c !== '')) { handleWin('draw'); return true; }
        return false;
    }
    
    function continueGame() { 
        if(!gameEnded) return;
        continuePressCount++;
        if(!secretBonusUsed && continuePressCount >= 10) {
            secretBonusUsed = true;
            addWins(5, true);
            alert(translations[currentLang].secretBonus);
            checkAllQuestsCompleted();
        }
        boardState = new Array(boardSize*boardSize).fill(''); 
        gameActive=true; gameEnded=false; isProcessingWin=false; currentPlayer='X'; lastWinAwarded=false;
        clearWinLine(); hideCheat(); renderBoard(); 
        document.getElementById('continueBtn').disabled=true; 
        if(playerSide!=='X'){ if(gameActive && !gameEnded && currentPlayer===aiSide) setTimeout(()=>makeAIMove(),150); } 
        updateStatusMsg(); 
    }
    
    function checkWinnerGeneric(board,size,player){ for(let i=0;i<size;i++){let win=true;for(let j=0;j<size;j++)if(board[i*size+j]!==player){win=false;break;}if(win)return true;} for(let j=0;j<size;j++){let win=true;for(let i=0;i<size;i++)if(board[i*size+j]!==player){win=false;break;}if(win)return true;} let d1=true;for(let i=0;i<size;i++)if(board[i*size+i]!==player)d1=false;if(d1)return true; let d2=true;for(let i=0;i<size;i++)if(board[i*size+(size-1-i)]!==player)d2=false;return d2;}
    function findWinningLineIndices(board,size,player){ for(let i=0;i<size;i++){let line=[];let ok=true;for(let j=0;j<size;j++){line.push(i*size+j);if(board[i*size+j]!==player)ok=false;}if(ok)return line;} for(let j=0;j<size;j++){let line=[];let ok=true;for(let i=0;i<size;i++){line.push(i*size+j);if(board[i*size+j]!==player)ok=false;}if(ok)return line;} let d1=[];let ok1=true;for(let i=0;i<size;i++){d1.push(i*size+i);if(board[i*size+i]!==player)ok1=false;}if(ok1)return d1; let d2=[];let ok2=true;for(let i=0;i<size;i++){d2.push(i*size+(size-1-i));if(board[i*size+(size-1-i)]!==player)ok2=false;}if(ok2)return d2; return[];}
    
    function getLineDirection(lineCells) { if(lineCells.length<2) return {dx:0,dy:0}; let size=boardSize; let first=lineCells[0], second=lineCells[1]; let row1=Math.floor(first/size), col1=first%size; let row2=Math.floor(second/size), col2=second%size; return {dx:row2-row1, dy:col2-col1}; }
    function showCheatAndWin(symbol, lineCells) { document.getElementById('cheatCell').innerHTML=symbol; document.getElementById('cheatArea').style.display='flex'; setTimeout(()=>{ const boardRect=document.getElementById('board').getBoundingClientRect(); const allCells=document.querySelectorAll('.cell'); const cheatCellRect=document.getElementById('cheatCell').getBoundingClientRect(); if(lineCells.length>0 && allCells.length>0){ const firstCell=allCells[lineCells[0]].getBoundingClientRect(); const x1=firstCell.left+firstCell.width/2-boardRect.left; const y1=firstCell.top+firstCell.height/2-boardRect.top; const x2=cheatCellRect.left+cheatCellRect.width/2-boardRect.left; const y2=cheatCellRect.top+cheatCellRect.height/2-boardRect.top; drawWinLine(x1,y1,x2,y2); } handleWin('ai'); },50); }
    
    function getImpossibleMoveWithCheat() { let size=boardSize, lines=[]; for(let i=0;i<size;i++){let row=[];for(let j=0;j<size;j++)row.push(i*size+j);lines.push(row);} for(let j=0;j<size;j++){let col=[];for(let i=0;i<size;i++)col.push(i*size+j);lines.push(col);} let d1=[],d2=[];for(let i=0;i<size;i++){d1.push(i*size+i);d2.push(i*size+(size-1-i));}lines.push(d1,d2); for(let line of lines){let aiCount=0,emptyPos=-1;for(let idx of line){if(boardState[idx]===aiSide)aiCount++;else if(boardState[idx]==='')emptyPos=idx;}if(aiCount===2 && emptyPos!==-1){showCheatAndWin(aiSide,line);return -2;}} for(let i=0;i<boardState.length;i++)if(boardState[i]===''){let c=[...boardState];c[i]=aiSide;if(checkWinnerGeneric(c,boardSize,aiSide))return i;let c2=[...boardState];c2[i]=(aiSide==='X'?'O':'X');if(checkWinnerGeneric(c2,boardSize,(aiSide==='X'?'O':'X')))return i;} let center=Math.floor(boardState.length/2);if(boardState[center]==='')return center; let corners=[0,boardSize-1,boardSize*(boardSize-1),boardState.length-1];for(let c of corners)if(boardState[c]==='')return c; let empty=[];for(let i=0;i<boardState.length;i++)if(boardState[i]==='')empty.push(i);return empty.length?empty[Math.floor(Math.random()*empty.length)]:-1;}
    
    function getAIMove(){ if(difficulty==='easy'){let e=[];for(let i=0;i<boardState.length;i++)if(boardState[i]==='')e.push(i);return e.length?e[Math.floor(Math.random()*e.length)]:-1;} if(difficulty==='medium'||difficulty==='hard'){for(let i=0;i<boardState.length;i++)if(boardState[i]===''){let c=[...boardState];c[i]=aiSide;if(checkWinnerGeneric(c,boardSize,aiSide))return i;let c2=[...boardState];c2[i]=(aiSide==='X'?'O':'X');if(checkWinnerGeneric(c2,boardSize,(aiSide==='X'?'O':'X')))return i;}let center=Math.floor(boardState.length/2);if(boardState[center]==='')return center;let e=[];for(let i=0;i<boardState.length;i++)if(boardState[i]==='')e.push(i);return e.length?e[Math.floor(Math.random()*e.length)]:-1;} if(difficulty==='impossible')return getImpossibleMoveWithCheat(); return -1;}
    
    function makeAIMove(){ if(!gameActive||gameEnded||isProcessingWin) return; if(currentPlayer!==aiSide) return; let move=getAIMove(); if(move===-2) return; if(move===-1) return; boardState[move]=aiSide; renderBoard(); if(!checkAndHandleWin()){ currentPlayer=(currentPlayer==='X')?'O':'X'; updateStatusMsg(); if(gameActive && !gameEnded && currentPlayer===aiSide && !isProcessingWin) setTimeout(()=>makeAIMove(),100); } }
    
    function playerMove(idx){ if(!gameActive||gameEnded||isProcessingWin) return; if(currentPlayer!==playerSide) return; if(boardState[idx]!=='') return; boardState[idx]=playerSide; renderBoard(); if(!checkAndHandleWin()){ currentPlayer=(currentPlayer==='X')?'O':'X'; updateStatusMsg(); if(gameActive && !gameEnded && currentPlayer===aiSide && !isProcessingWin) setTimeout(()=>makeAIMove(),100); } }
    
    function renderBoard(){ const bd=document.getElementById('board'); bd.style.gridTemplateColumns=`repeat(${boardSize},1fr)`; bd.innerHTML=''; for(let i=0;i<boardState.length;i++){let cell=document.createElement('div');cell.classList.add('cell');cell.innerText=boardState[i];cell.addEventListener('click',(function(idx){return function(){playerMove(idx);};})(i));bd.appendChild(cell);} const svg=document.createElementNS('http://www.w3.org/2000/svg','svg'); svg.setAttribute('class','win-line-svg'); svg.setAttribute('id','winLineSvg'); bd.appendChild(svg); }
    
    function resetGameFull(){ boardState=new Array(boardSize*boardSize).fill(''); gameActive=true; gameEnded=false; isProcessingWin=false; currentPlayer='X'; lastWinAwarded=false; clearWinLine(); hideCheat(); renderBoard(); document.getElementById('continueBtn').disabled=true; if(playerSide!=='X'){if(gameActive&&!gameEnded&&currentPlayer===aiSide)setTimeout(()=>makeAIMove(),150);} updateStatusMsg(); totalGames++; if(playerSide==='X')gamesAsX++; else gamesAsO++; checkQuestsAfterGame(false); }
    
    function checkQuestsAfterGame(isWin) { 
        checkQuestTotalGames(); 
        checkQuestPlayAs(); 
        if(isWin && difficulty==='impossible' && !impossibleWinDone) { addWins(2, true); impossibleWinDone=true; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); }
        checkQuestAllUpgrades(); 
        if(isWin && boardSize===5 && difficulty==='hard' && !size5HardWin) { addWins(2, true); size5HardWin=true; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); }
        if(isWin && boardSize===4) { size4WinsCount++; if(size4WinsCount>=3 && !window._size4QuestDone) { addWins(2, true); window._size4QuestDone=true; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); } }
        checkQuestWins(); 
        renderQuests();
        checkAllQuestsCompleted();
    }
    
    function checkQuestTotalGames() { if(totalGames>=10) { addWins(1, true); totalGames=-999; alert(`${translations[currentLang].questComplete}1 ${translations[currentLang].reward}`); } }
    function checkQuestPlayAs() { if(gamesAsX>=5) { addWins(2, true); gamesAsX=-999; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); } if(gamesAsO>=5) { addWins(2, true); gamesAsO=-999; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); } }
    function checkQuestAllUpgrades() { if(!allUpgradesBought && doublePurchased && size4Unlocked && size5Unlocked && impossibleUnlocked) { addWins(2, true); allUpgradesBought=true; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); } }
    function checkQuestWins() { if(winsCount>=5) { addWins(2, true); winsCount=-999; alert(`${translations[currentLang].questComplete}2 ${translations[currentLang].reward}`); } }
    function checkQuestConsecutiveWins() { if(consecutiveWins>=3) { addWins(1, true); consecutiveWins=-999; alert(`${translations[currentLang].questComplete}1 ${translations[currentLang].reward}`); } }
    
    function checkAllQuestsCompleted() {
        let allDone = (totalGames>=10 || totalGames===-999) && allUpgradesBought && impossibleWinDone && (gamesAsX>=5 || gamesAsX===-999) && (gamesAsO>=5 || gamesAsO===-999) && (winsCount>=5 || winsCount===-999) && (consecutiveWins>=3 || consecutiveWins===-999) && size5HardWin && (size4WinsCount>=3 || window._size4QuestDone) && hiddenPromoUsed;
        document.getElementById('resetQuestsBtn').disabled = !allDone;
        return allDone;
    }
    
    function resetAllQuests() {
        if(!checkAllQuestsCompleted()) return;
        if(confirm(translations[currentLang].resetQuestsConfirm)) {
            totalGames = 0; gamesAsX = 0; gamesAsO = 0; winsCount = 0; consecutiveWins = 0; 
            impossibleWinDone = false; allUpgradesBought = false; size5HardWin = false; 
            size4WinsCount = 0; window._size4QuestDone = false; hiddenPromoUsed = false;
            continuePressCount = 0; secretBonusUsed = false;
            renderQuests();
            checkAllQuestsCompleted();
            alert("Квесты сброшены!");
        }
    }
    
    function applyPromo() { 
        let code=document.getElementById('promoInput').value.trim().toLowerCase(); 
        if(code==='') {
            if(!hiddenPromoUsed) {
                hiddenPromoUsed = true;
                addWins(2, true);
                alert(translations[currentLang].promoEmpty);
                checkAllQuestsCompleted();
                renderQuests();
            } else {
                alert(translations[currentLang].promoUsed);
            }
            document.getElementById('promoInput').value = '';
            return;
        }
        if(code==='лето2026'||code==='июнь2026'){ addWins(1, true); alert(translations[currentLang].promo1); }
        else if(code==='антон2012'){ addWins(2, true); alert(translations[currentLang].promo2); }
        else if(code==='гомель'){ addWins(3, true); alert(translations[currentLang].promo3); }
        else{ alert(translations[currentLang].promoInvalid); return; }
        document.getElementById('promoInput').value = ''; 
        renderQuests();
        checkAllQuestsCompleted();
    }
    
    function renderQuests() { 
        const q = [
            {text:translations[currentLang].quest1, reward:"1", done:totalGames>=10||totalGames===-999},
            {text:translations[currentLang].quest2, reward:"2", done:allUpgradesBought},
            {text:translations[currentLang].quest3, reward:"2", done:impossibleWinDone},
            {text:translations[currentLang].quest4, reward:"2", done:gamesAsX>=5||gamesAsX===-999},
            {text:translations[currentLang].quest5, reward:"2", done:gamesAsO>=5||gamesAsO===-999},
            {text:translations[currentLang].quest6, reward:"2", done:winsCount>=5||winsCount===-999},
            {text:translations[currentLang].quest7, reward:"1", done:consecutiveWins>=3||consecutiveWins===-999},
            {text:translations[currentLang].quest8, reward:"2", done:size5HardWin},
            {text:translations[currentLang].quest9, reward:"2", done:!!window._size4QuestDone},
            {text:translations[currentLang].quest10, reward:"2", done:hiddenPromoUsed}
        ];
        document.getElementById('questsList').innerHTML=q.map(qq=>`<div class="quest-item ${qq.done?'completed':''}"><span>${qq.text}</span><span class="quest-reward">+${qq.reward}</span></div>`).join('');
    }
    
    function setBoardSize(size){ if(size===4&&!size4Unlocked)return; if(size===5&&!size5Unlocked)return; boardSize=size; resetGameFull(); updateActiveHighlights(); }
    function setDifficulty(diff){ if(diff==='impossible'&&!impossibleUnlocked)return; difficulty=diff; updateActiveHighlights(); resetGameFull();}
    function setPlayerSide(side){ playerSide=side; aiSide=(playerSide==='X')?'O':'X'; updateActiveHighlights(); resetGameFull();}
    function setTheme(theme){ currentTheme=theme; document.body.classList.remove('light','dark'); document.body.classList.add(theme); document.getElementById('themeSelect').value=theme; }
    function setLanguage(lang){ currentLang=lang; document.querySelectorAll('.lang-btn').forEach(btn=>{if(btn.dataset.lang===lang)btn.classList.add('active');else btn.classList.remove('active');}); document.getElementById('langSelect').value=lang; updateAllTexts(); updateStatusMsg(); updateActiveHighlights(); renderQuests();}
    function updateSizeButtons(){ let s4=document.getElementById('size4Btn'), s5=document.getElementById('size5Btn'); s4.disabled=!size4Unlocked; s4.innerHTML=size4Unlocked?'4x4':'4x4 🔒'; s5.disabled=!size5Unlocked; s5.innerHTML=size5Unlocked?'5x5':'5x5 🔒'; document.querySelectorAll('.size-btn').forEach(b=>{if(parseInt(b.dataset.size)===boardSize&&!b.disabled)b.classList.add('active');else b.classList.remove('active');}); }
    function updateActiveHighlights(){ document.querySelectorAll('.difficulty-btn').forEach(b=>{if(b.dataset.diff===difficulty)b.classList.add('active');else b.classList.remove('active');}); document.querySelectorAll('.side-btn').forEach(b=>{if(b.dataset.side===playerSide)b.classList.add('active');else b.classList.remove('active');}); updateSizeButtons(); }
    
    function buyItem(item){ if(item==='double'&&winCounter>=1&&!doublePurchased){winCounter--; doublePurchased=true; doublePointsActive=true; if(doublePointsTimeout)clearTimeout(doublePointsTimeout); doublePointsTimeout=setTimeout(()=>{doublePointsActive=false;},120000); document.getElementById('winScore').innerHTML=winCounter; updateShopButtons(); checkQuestAllUpgrades(); alert(translations[currentLang].doubleAlert);}
    else if(item==='size4'&&winCounter>=2&&!size4Unlocked){winCounter-=2; size4Unlocked=true; document.getElementById('winScore').innerHTML=winCounter; updateShopButtons(); updateActiveHighlights(); if(boardSize===3)setBoardSize(4); checkQuestAllUpgrades(); alert(translations[currentLang].size4Alert);}
    else if(item==='size5'&&winCounter>=4&&!size5Unlocked){winCounter-=4; size5Unlocked=true; document.getElementById('winScore').innerHTML=winCounter; updateShopButtons(); updateActiveHighlights(); if(boardSize===3||boardSize===4)setBoardSize(5); checkQuestAllUpgrades(); alert(translations[currentLang].size4Alert);}
    else if(item==='impossible'&&winCounter>=3&&!impossibleUnlocked){winCounter-=3; impossibleUnlocked=true; document.getElementById('winScore').innerHTML=winCounter; updateShopButtons(); updateActiveHighlights(); document.getElementById('impossibleBtn').innerHTML=translations[currentLang].impossible; if(difficulty==='impossible')setDifficulty('impossible'); checkQuestAllUpgrades();}
    else if(item==='random'&&winCounter>=2){winCounter-=2; document.getElementById('winScore').innerHTML=winCounter; let r=['double','size4','coins'][Math.floor(Math.random()*3)]; if(r==='double'&&!doublePurchased){doublePurchased=true; doublePointsActive=true; if(doublePointsTimeout)clearTimeout(doublePointsTimeout); doublePointsTimeout=setTimeout(()=>{doublePointsActive=false;},120000); updateShopButtons(); checkQuestAllUpgrades(); alert(translations[currentLang].doubleAlert);} else if(r==='size4'&&!size4Unlocked){size4Unlocked=true; updateActiveHighlights(); updateShopButtons(); checkQuestAllUpgrades(); alert(translations[currentLang].size4Alert);} else{winCounter++; document.getElementById('winScore').innerHTML=winCounter; updateShopButtons(); alert(translations[currentLang].coinAlert);}}}
    
    function initEvents(){
        document.getElementById('continueBtn').addEventListener('click',()=>continueGame());
        document.getElementById('resetGameBtn').addEventListener('click',()=>resetGameFull());
        document.getElementById('openShopBtn').addEventListener('click',()=>document.getElementById('shopModal').style.display='flex');
        document.getElementById('openSettingsBtn').addEventListener('click',()=>document.getElementById('settingsModal').style.display='flex');
        document.getElementById('closeModal').addEventListener('click',()=>document.getElementById('shopModal').style.display='none');
        document.getElementById('closeSettingsBtn').addEventListener('click',()=>document.getElementById('settingsModal').style.display='none');
        document.getElementById('applyPromoBtn').addEventListener('click',()=>applyPromo());
        document.getElementById('resetQuestsBtn').addEventListener('click',()=>resetAllQuests());
        document.querySelectorAll('.buy-btn').forEach(b=>b.addEventListener('click',()=>{buyItem(b.dataset.item); document.getElementById('shopModal').style.display='none'; setTimeout(()=>document.getElementById('shopModal').style.display='flex',100);}));
        document.querySelectorAll('.size-btn').forEach(b=>b.addEventListener('click',()=>setBoardSize(parseInt(b.dataset.size))));
        document.querySelectorAll('.difficulty-btn').forEach(b=>b.addEventListener('click',()=>setDifficulty(b.dataset.diff)));
        document.querySelectorAll('.side-btn').forEach(b=>b.addEventListener('click',()=>setPlayerSide(b.dataset.side)));
        document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLanguage(b.dataset.lang)));
        document.getElementById('langSelect').addEventListener('change',e=>setLanguage(e.target.value));
        document.getElementById('themeSelect').addEventListener('change',e=>setTheme(e.target.value));
        window.onclick=e=>{if(e.target===document.getElementById('shopModal'))document.getElementById('shopModal').style.display='none'; if(e.target===document.getElementById('settingsModal'))document.getElementById('settingsModal').style.display='none';};
    }
    
    function start(){ boardSize=3; difficulty='easy'; impossibleUnlocked=false; size4Unlocked=false; size5Unlocked=false; doublePurchased=false; winCounter=0; doublePointsActive=false; playerSide='X'; aiSide='O'; totalGames=0; gamesAsX=0; gamesAsO=0; winsCount=0; consecutiveWins=0; impossibleWinDone=false; allUpgradesBought=false; size5HardWin=false; size4WinsCount=0; window._size4QuestDone=false; hiddenPromoUsed=false; continuePressCount=0; secretBonusUsed=false; document.getElementById('winScore').innerHTML='0'; setLanguage('ru'); setTheme('light'); updateActiveHighlights(); setBoardSize(3); setDifficulty('easy'); setPlayerSide('X'); initEvents(); resetGameFull(); renderQuests(); checkAllQuestsCompleted(); }
    start();
</script>
</body>
